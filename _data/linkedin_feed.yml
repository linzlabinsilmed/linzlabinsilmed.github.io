- title: >-
    🌟 Meet Our New Visitors: Aldo and Giuseppe 🌟 


    We are delighted to warmly welcome our new visitors, Aldo Karamani and
    Giuseppe Mallo 👋 


    Both are currently pursuing a Master’s degree in Data Science and
    Engineering at Politecnico di Torino 🎓, where they also completed their
    Bachelor’s degree in Computer Engineering. In our lab, they are both working
    under the supervision of Davide Baroli. 


    Aldo Karamani is undertaking an internship focused on AI-driven cardiac
    image segmentation 🫀. The project aims to reduce the time and cost
    associated with manual annotation of cardiac CT and MRI images by developing
    and evaluating machine learning models for automated and AI-assisted
    segmentation. Outside of his academic work, Aldo enjoys bodyweight training
    and calisthenics 💪. He sees these activities as a way to develop
    discipline, consistency, body control, and patience. 


    Giuseppe Mallo is undertaking an internship focused on investigating the
    mechanisms underlying proliferation and disease progression in colorectal
    cancer 🧬. The goal of his work is to identify key drivers of tumor growth
    and metastasis. The project leverages data from patient-derived organoids
    and addresses these tasks through the use of AI and deep learning models.
    Outside the lab, Giuseppe is passionate about singing 🎤, which he sees as a
    powerful way to communicate emotions and stories through live performance. 


    We hope that during their stay they’ll be able to strengthen their technical
    and scientific skills, while also finding time to keep growing and enjoying
    the things they’re passionate about 🌱 


    Welcome, Aldo and Giuseppe! 🎉 


