- title: >-
    💻🫀  openCARP User Meeting 


    Last week, our PhD student Luca Pasini attended the 7th openCARP User
    Meeting in Bordeaux, hosted by the IHU LIRYC - Heart rhythm disease
    Institute. 


    openCARP is an open cardiac electrophysiology simulator designed for
    in-silico experiments. In addition to simulation capabilities, it also
    includes tools for data pre- and post-processing and visualization, making
    it a helpful resource for researchers in computational cardiology. 


    During the meeting, experienced trainers guided participants through
    hands-on sessions, and Luca Pasini joined the beginner track, where he
    learned how to design and set up a cardiac electrophysiology tissue
    simulation from scratch 💡. In addition to the hands-on training, the
    meeting created space for discussions and networking, giving early-career
    scientists the chance to connect with more experienced researchers in the
    field 🤝 


    We would like to thank the organisers and trainers for creating such a great
    environment for learning, discussion, and exchange 👍 . We’re excited to see
    how the openCARP community continues to expand the possibilities of cardiac
    electrophysiology simulations 🫀 🚀 


    openCARP: https://opencarp.org/ 


    #ComputationalModeling #CardiacElectrophysiology #InSilico #openCARP
