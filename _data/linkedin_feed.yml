    ✨ Happy New Year 2026✨


    As 2025 comes to an end, we’re taking a moment to reflect on our work,
    collaborations, and community over the past year. Some highlights of this
    year include:


    🔹 Publications: Published 3 scientific papers and 5 conference papers on
    topics including pulsed field ablation, radiofrequency ablation, laser
    ablation, ECMO, and cardiovascular modelling, with more forthcoming.

    🔸 Conferences & Events: Participated in 15 conferences and workshops,
    presenting our current research and gaining up-to-date knowledge.

    🔹 Team Growth: Welcomed 3 new members to our team.

    🔸 Mentoring: Mentored 7 students (2 PhD, 2 MSc and 3 BSc) and hosted 3
    foreign students. 

    🔷 Grants & Funding: 4 third-party funding sources to support research on
    radiofrequency ablation, pulsed field ablation and ECMO. 

    🔸 Digital Presence: Launched our website (https://lnkd.in/ekrHK43B) and
    YouTube channel (https://lnkd.in/dZ75uHZa) to share research updates and
    resources.


    A heartfelt thank you to everyone who supported and inspired us in 2025! ❤️


    May 2026 be filled with new opportunities, exciting discoveries, and
    meaningful connections. Wishing a happy, healthy, and inspiring 2026 to all!
    🎉✨
