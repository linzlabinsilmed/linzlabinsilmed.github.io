- title: >-
    🔥 Turning a Barbecue into a Research Project 🔥


    Every year, the ÖH JKU  barbecue brings together students and staff of the
    Faculty of Engineering and Natural Sciences at Johannes Kepler Universität
    Linz for an afternoon of great food 🍖 and fun activities 🎉. 


    One tradition is especially hard to miss: a whole pig slowly roasting on the
    grill. Watching it roast sparked a question: How does heat actually
    propagate through an entire pig during the cooking process? 🤔 


    This year, we decided to go beyond curiosity and investigate it
    scientifically. As part of her bachelor's thesis, Katharina Buchmayr
    developed a thermal simulation of the roasting process, modeling how heat
    spreads through the pig over time. Kathi presented her results right at the
    barbecue, connecting computational modeling 💻 with a real-world (and tasty
    😄) problem.  


    She was joined by her supervisors, Luca Gerardo-Giorda and Argyrios Petras,
    as well as Beata Ondrusova, Minha Anees, Luca Pasini, Aldo Karamani, Rainer
    Schelling, Giuseppe Mallo and Nikolaos T.  who came to support her
    presentation 🎓. 


    Although roasting a pig is far from a clinical application, the same
    computational methods are used to model heat transfer in biological tissue
    and support the development of thermal treatment strategies. 🏥 


    Congratulations to Kathi! 👏 


    LinzLab webpage: https://lnkd.in/ekrHK43B


