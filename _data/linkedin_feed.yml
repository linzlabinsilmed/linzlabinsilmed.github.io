- title: >-
    🌍 On the road 🌍

     

    A busy and productive start of the month for our colleague Argyrios Petras,
    who spent the past weeks in 🇪🇸 Spain and 🇩🇪 Germany strengthening
    existing partnerships and building new international collaborations.


    In Barcelona, Argyrios visited Hospital de la Santa Creu i Sant Pau, where
    he met with Jose M Guerra, Zoraida Moreno Weidmann, and Gerard Amorós
    Figueras. During his stay, he attended PFA experiments and ablation
    procedures, including the first dual-energy procedure in Spain using the
    Tactiflex Duo system! He also had several useful meetings that helped move
    our joint research projects forward 🔬 


    In Berlin, he visited Weierstrass Institute, where he worked closely with
    Anieza Maltsi and delivered a presentation titled “Mathematical Modeling of
    Cardiac Radiofrequency Ablation: From Patient-Specific Simulation to Porous
    Media Tissue Formulations.” Our colleague Davide Baroli also joined
    virtually, and our group initiated new collaborations with Matthias Liero,
    Dirk Peschka, and Anieza Maltsi, along with engaging discussions with
    Alfonso Caiazzo on potential future projects 🤝 


    These visits showed how important it is to bring different people and ideas
    together, especially when working on interdisciplinary topics. We’re excited
    to build on these connections and keep the work going 🚀 


    #InternationalCollaboration #CardiacAblation #InterdisciplinaryResearch
