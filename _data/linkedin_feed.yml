    🌟Team Spotlight: Minha in Bordeaux🌟


    Our colleague Minha Anees Msc spent the month of November at the Modelling
    Department at IHU LIRYC - Heart rhythm disease Institute in Bordeaux,
    working under the expert guidance of Ed Vigmond, focusing on cardiac
    cellular electrophysiology models.


    During her time there, Minha worked extensively with openCARP, gained
    hands-on experience in setting up simulation pipelines💻, and strengthened
    her skills in interpreting complex electrophysiological modelling outputs
    🫀.


    We sincerely thank Ed Vigmond and the entire team for their warm welcome and
    support 🤝.  We are excited to see how Minha applies her new knowledge and
    skills to advance her work!✨
