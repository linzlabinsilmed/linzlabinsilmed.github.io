- title: >-
    ✨ CMBE 2026 ✨


    Our colleague Argyrios Petras participated in the 9th CMBE: Computational
    and Mathematical Biomedical Engineering - International Conference Series
    (#CMBE2026), held in Kobe, Japan 🇯🇵, from June 22–24. #CMBE2026 brought
    together leading researchers, academics, practitioners, and graduate
    students from diverse disciplines to discuss the latest advances in
    computational biomedical engineering. 


    🎤 During the conference, Argyrios chaired the mini-symposium
    "Personalization and Uncertainty Quantification in Digital Twins for Medical
    Applications," which he co-organized with Matthias G., Elias Karabelas, and
    Sebastian Brandstäter. The symposium focused on cutting-edge methods for
    quantifying and propagating uncertainties in medical digital twins, as well
    as strategies for model personalization through detailed anatomical modeling
    and multi-patient studies. 


    🫀 In addition, Argyrios presented research conducted in collaboration with
    his PhD student, Luca Pasini, introducing a computational framework for
    personalized monopolar cardiac pulsed field ablation (PFA). Their work
    integrates contact mechanics and electric field simulations within
    anatomically realistic, pig-specific geometries to predict lesion formation
    during monopolar cardiac PFA, contributing to the development of more
    personalized and reliable treatment planning. 


    Congratulations to Argyrios and Luca on sharing their latest research at
    #CMBE2026, and thanks to the organizers for a great conference! 👏 


    Conference website: https://lnkd.in/eXdRGZSt

    Conference proceedings: https://lnkd.in/edd7UuP5

