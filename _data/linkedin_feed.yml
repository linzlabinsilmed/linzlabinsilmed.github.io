    🌟 Projektwoche Angewandte Mathematik 🌟


    📊  From February 8–12, selected high school students from Upper Austria
    participated in the Projektwoche Angewandte Mathematik (Project Week of
    Applied Mathematics), where they spent five intensive days learning how
    mathematics can be used to solve real-world problems. 


    Our colleague Argyrios Petras led one of the five project groups. His group
    focused on mathematical modeling in medical imaging, and under his guidance,
    students explored how geometries of organs and tissues can be reconstructed
    from MRI and CT scan data and how these digital models can support medical
    diagnosis and therapy planning. In a hands-on exercise, they even developed
    a treatment plan for a patient with lung cancer 🫁. 


    The week concluded with final presentations 🎤, where all five groups shared
    their projects and results with the full audience. We were impressed by the
    students’ creativity, teamwork, and the depth of their work throughout the
    week.


    🙏 A big thank you to all organizers, Verein Talente OÖ, the Department of
    Education of Upper Austria, and Johannes Kepler Universität Linz,  for
    making this valuable learning experience possible.


    It’s inspiring to see young students engaged in applied mathematics, and we
    wish them the very best of luck in their future journeys 🚀 . 


    Projektwoche Angewandte Mathematik website: https://lnkd.in/dM7Yh_Gx
