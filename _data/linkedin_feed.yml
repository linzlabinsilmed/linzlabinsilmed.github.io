    ⏳ Final Call for Abstracts: CMBE2026 Minisymposium


    There is less than one month left to submit your work for our upcoming
    minisymposium at the 9th International Conference on Computational and
    Mathematical Biomedical Engineering (CMBE2026) in Kobe, Japan.


    📍 MS4: Personalization and Uncertainty Quantification in Digital Twins for
    Medical Applications


    As we move toward high-fidelity digital twins in healthcare, addressing the
    challenges of patient-specific tuning and the quantification of uncertainty
    is more critical than ever. We invite you to contribute your latest research
    to our MS4.


    Key Details:

    📅 Submission Deadline: 16 February 2026

    🗓️ Conference Dates: 22 – 24 June 2026

    🌏 Location: Kobe International Conference Center, Japan

    🔗 Submit here: https://lnkd.in/dPcwVYjq


    Organizers:

    • Argyrios Petras (RICAM)

    • Matthias G. (Medical University of Graz)

    • Elias Karabelas (University of Graz, NumeriCor GmbH)

    • Sebastian Brandstäter (University of the Bundeswehr Munich)


    We look forward to seeing your innovative work and connecting with you in
    Kobe this summer! 🇯🇵


