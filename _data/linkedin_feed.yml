- title: >-
    🌟TNF-MED Interaction 🌟


    Most recent Thursday, we presented our latest research at the 4th TNF-MED
    Interaction, organised by the Faculty of Engineering and Natural Sciences
    (TNF) together with the Faculty of Medicine (MED) at Johannes Kepler
    University. The TNF-MED Interaction is designed to share recent research
    and, more importantly, to strengthen collaboration between engineering,
    natural sciences, and medicine.


    🔹 Neurooncology

    Our medical collaborator Philip-Rudolf Rauch from the Department of
    Neurosurgery at Kepler Universitätsklinikum GmbH (KUK) showed how digital
    twins can be used to study the progression of glioma tumours. This work,
    carried out in collaboration with Luca Gerardo-Giorda and Davide Baroli,
    demonstrates the value of close collaboration between researchers and
    clinicians.


    🔹 Cardiac interventions

    Our group leader Luca Gerardo-Giorda presented our latest results on
    in-silico modelling of ablation treatments, with a particular focus on
    cardiac applications of radiofrequency and pulsed-field ablation. This
    research is primarily led by Argyrios Petras and his team of undergraduate
    and graduate students.


    🔹 VV-ECMO

    Beata Ondrusova, our postdoctoral researcher, shared recent results on the
    use of computational fluid dynamics to study patient-specific blood flow
    patterns in VV-ECMO patients. This work is carried out in close
    collaboration with Jens Meier, head of Anesthesiology and Operative
    Intensive Care Medicine at Kepler Universitätsklinikum GmbH.


    We really appreciated the opportunity not only to present our work, but also
    to learn about the research of other groups and explore potential
    collaborations. Many thanks to the organisers for putting together such a
    well-run and inspiring event 👏 . We are looking forward to future editions
    of TNF-MED! 🥳
