- title: >-
    🤔 Can we reduce recirculation in VV-ECMO?  


    In our latest study, we used computational modeling to investigate how
    return cannula design can influence recirculation and oxygen delivery in
    veno-venous extracorporeal membrane oxygenation (VV-ECMO).  


    VV-ECMO is a life-support technique that temporarily replaces lung function
    🫁 by oxygenating blood outside the body and returning it to the venous
    circulation in patients with severe respiratory failure. However, not all of
    this oxygen-rich blood reaches the systemic circulation. A portion can be
    immediately drawn back into the drainage cannula and recirculate through the
    ECMO circuit. This phenomenon is known as recirculation, and it reduces the
    overall efficiency of oxygen delivery. 


    Using computational modelling 💻, we compared commercial returning cannulas
    with our novel performance-driven designs across different ECMO flow rates.
    Results show that cannula design has a significant impact on VV-ECMO
    performance, especially at higher flow rates. In particular, our prototypes
    with closed tips showed reduced recirculation and increased oxygen
    saturation, without a noticeable increase in complications such as
    thrombosis or hemolysis. 


    Thus, our findings suggest that there is still room for improvement in
    return cannula design, and that some of our proposed designs could improve
    VV-ECMO performance, mainly in patients who depend heavily on full
    respiratory support due to severely impaired lung function. 


    This work also highlights the importance of interdisciplinary collaboration
    🤝, and we are grateful to the entire team from for their contributions.
    Many thanks to Beata Ondrusova, Argyrios Petras, Johannes Szasz, Jens Meier,
    and Luca Gerardo-Giorda! We look forward to continuing this collaboration
    and bringing these results closer to clinical use 🚀.  


    This work was supported by LIT SeedPlusMED ECMOPT from JKU – LIT Open
    Innovation Center.  


    Full paper: https://lnkd.in/deUHfdM9  

