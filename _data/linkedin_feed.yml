    ✨ ESGI 2026 ✨


    🚀 Our colleague Minha Anees Msc recently participated in the 194th European
    Study Group with Industry (ESGI), a workshop organized by Weierstrass
    Institute in Berlin that brings together mathematicians and industry
    partners to address practical challenges. During the week, participants
    worked in teams to address problems submitted by industry partners and
    presented their results at the end of the workshop. 


    🌍 Minha was part of an international team working on a challenge proposed
    by the Berlin-based company 1KOMMA5°. The project focused on energy market
    optimization and the integration of renewable energy sources ⚡ 


    🔍Although the energy sector is outside her usual field of work, the
    workshop was a valuable opportunity for Minha to apply her mathematical
    expertise in a new domain and collaborate with researchers and industry
    professionals from different backgrounds on a real-world challenge. 


    👏 We would like to thank the organizers for their work in running this
    workshop and maintaining a long-standing initiative that has brought
    together academia and industry since 1968!  


    More information on ESGI: https://lnkd.in/d8shGkrP

