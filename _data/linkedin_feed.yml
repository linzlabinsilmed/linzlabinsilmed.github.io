- title: >-
    ✨ ADWIM 2026✨


    Our colleagues Beata Ondrusova, Minha Anees Msc, and Laura Füssel
    represented our research group at the 6th Austrian Day of Women in
    Mathematics (ADWiM 2026), held on 26–27 February 2026 in Graz. ADWIM 2026
    took place at the University of Graz and was hosted by Graz Women in Math
    (GWM) in collaboration with the Austrian Association of Women in Mathematics
    (A2WiM). 


    ADWiM is an annual meeting that brings together researchers and
    mathematicians to share current work, exchange ideas, and strengthen a
    supportive network for women and non-binary people in mathematics. Alongside
    inspiring talks, this year’s program also included a session on current
    scientific perspectives on sex and gender and a session on supervision from
    both student and supervisor viewpoints🎓🤝


    Highlights from our team:


    🫁 Beata presented her work on computational-based risk assessment in
    VV-ECMO, focusing on the prediction of complications such as thrombosis and
    hemolysis.


    🫀Minha shared results from her PhD research on the impact of body mass
    index on power distribution in high-power RF ablation for atrial
    fibrillation.


    📊 For Laura, this was her first conference experience, and she did a very
    good job sharing her work during the poster session. She presented her
    bachelor’s thesis work, comparing in-vitro experiments and in-vivo
    application of cardiac radiofrequency ablation. 


    We value initiatives like ADWiM that create space for research exchange and
    community building. Our sincere thanks to all organisers for creating a
    welcoming and thoughtfully designed event. Our colleagues are already
    looking forward to the next edition! 🌱


    A2WiM: https://lnkd.in/ddyDtByU

    GWM: https://lnkd.in/db5B-nbZ


