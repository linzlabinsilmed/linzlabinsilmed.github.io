- title: >-
    🌟 Matteo Joins Our Team! 🌟 


    A warm welcome to Matteo Micocci, the newest member of our Linz Lab for
    In-Silico Medical Interventions! 


    Matteo earned his Bachelor’s degree in Mechanical Engineering from the Alma
    Mater Studiorum – Università di Bologna, where he developed a model to
    predict the positioning of foot bones when subjected to mechanical load. To
    further his studies, he pursued a Master’s degree in Biomechanics at the
    Politecnico di Torino.


    Now working at our lab for his Master’s thesis under the supervision of
    Davide Baroli, Matteo is focusing on the simulation of aortic coarctation, a
    condition affecting pediatric patients. His research aims to create a
    computational model that can enhance the understanding of the disease by
    considering both short- and long-term effects to help optimize patient
    outcomes.


    Outside the lab, Matteo is passionate about sports and the outdoors, with a
    love for mountain hiking 🥾, climbing  🏔️  , and running 🏃 . Living so
    close to the Alps, he is eager to explore the surrounding peaks and trails. 


    Wishing Matteo an inspiring journey with us! We’re excited for the ideas and
    energy he’ll bring to the team. 🎉
